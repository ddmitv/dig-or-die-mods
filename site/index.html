<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to World Viewer...</title>
    
    <!-- Tells search engines the new permanent home -->
    <link rel="canonical" href="world-viewer/" />
    
    <!-- Instant HTML meta redirect -->
    <meta http-equiv="refresh" content="0; url=world-viewer/" />
    
    <!-- JavaScript fallback in case meta refresh is blocked -->
    <script>
        window.location.replace("world-viewer/");
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #333;">
    <h1>Redirecting...</h1>
    <p>If you are not redirected automatically, <a href="world-viewer/">click here to open the World Viewer</a>.</p>
</body>
</html>
